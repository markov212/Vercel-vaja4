<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT System Status Dashboard</title>
  <style>
    /* Vse oblikovanje (CSS) je zdaj kar tukaj */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
    }
    main {
      max-width: 600px;
      width: 100%;
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    h2 {
      margin-top: 0;
      color: #38bdf8;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 0.95rem;
    }
    .status-container {
      margin: 25px 0;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: #0f172a;
      margin-bottom: 10px;
      border-radius: 8px;
    }
    .badge {
      font-size: 0.8rem;
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .badge.online {
      background: #10b981;
      color: #052e16;
    }
    hr {
      border: 0;
      height: 1px;
      background: #334155;
      margin: 25px 0;
    }
    button {
      background: #38bdf8;
      color: #0f172a;
      border: none;
      padding: 10px 20px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #0ea5e9;
    }
    #ping-result {
      color: #cbd5e1;
      font-style: italic;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <main>
    <h2>IT System Status Dashboard</h2>
    <p class="subtitle">Spremljanje delovanja lokalnih IT storitev in strežnikov.</p>
    
    <div class="status-container">
      <div class="status-item">
        <span>Baza podatkov (Supabase Cloud)</span>
        <span class="badge online">ONLINE</span>
      </div>
      <div class="status-item">
        <span>Glavni API Strežnik</span>
        <span class="badge online">ONLINE</span>
      </div>
      <div class="status-item">
        <span>Vercel Edge Network</span>
        <span class="badge online">ONLINE</span>
      </div>
    </div>

    <hr>

    <div class="interactive-section">
      <h3>Preveri odzivni čas (Ping)</h3>
      <button onclick="checkPing()">Zaženi test omrežja</button>
      <p id="ping-result">Kliknite gumb za začetek merjenja...</p>
    </div>
  </main>

  <script>
    /* Vsa logika (JavaScript) je zdaj kar tukaj */
    function checkPing() {
      const resultText = document.getElementById("ping-result");
      resultText.innerText = "Skeniram omrežje...";
      
      setTimeout(() => {
        const randomPing = Math.floor(Math.random() * (45 - 14 + 1)) + 14;
        resultText.innerHTML = `Povezava stabilna. Trenutni odzivni čas: <strong style="color: #10b981;">${randomPing} ms</strong> (OK)`;
      }, 1200);
    }
  </script>
</body>
</html>
